
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Log" style="display:block;margin: 0 auto; width: 100px;">
    <h1>Mchinji Secondary Web Portal</h1><br><br>
    <h3>Choose your category below </h3>
    <button id="daySchoolBtn" class="green-btn">View Day School Results</button><br><br>
    <button id="odlBtn" class="green-btn">View ODL Results</button><br><br>
    <div id="options" style="display: none;">
      <p id="instruction" style="color:#666;">Select your form then enter your exam number and password below:</p>
      <select id="form">
        <!-- options will be populated dynamically -->
      </select><br><br>
      Exam No: <input id="examNo" type="text"><br><br>
      Password: <input id="password" type="password"><br><br>
      <button id="checkResultBtn" class="green-btn">Check</button>
    </div>
    <div id="result"></div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
