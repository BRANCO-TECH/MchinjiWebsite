<!DOCTYPE html>
<html>
<body>
  <h1>Check Exam Result</h1>
  Form: <select id="form"><option value="1">Form 1</option><option value="2">Form 2</option><option value="3">Form 3</option><option value="4">Form 4</option></select><br><br>
  Exam No: <input id="examNo" type="text"><br><br>
  DOB: <input id="dob" type="date"><br><br>
  <button onclick="checkResult()">Check</button>
  <div id="result"></div>

  <script>
    function checkResult() {
      const form = document.getElementById('form').value;
      const examNo = document.getElementById('examNo').value.trim();
      const dob = document.getElementById('dob').value;
      const csvFile = 'results.csv';

      fetch(csvFile)
        .then(r => r.text())
        .then(data => {
          const rows = data.split('\n');
          for (let row of rows) {
            const cols = row.split(',');
            // Assuming columns: exam_no(0), dob(1), name(2), ...
            if (cols[0].trim() === examNo && cols[1].trim() === dob.split('-').reverse().join('/')) {
              let html = `<h3>${cols[2]}</h3>`;
              html += `Form: ${form}<br>`;
              // Add more columns as needed (e.g., grades, subjects)
              html += `Bio: ${cols[3]}<br>`;
              html += `Phy: ${cols[4]}<br>`;
              html += `Chem: ${cols[5]}<br>`;
              document.getElementById('result').innerHTML = html;
              return;
            }
          }
          document.getElementById('result').innerHTML = 'No match found';
        });
    }
  </script>
</body>
</html>
