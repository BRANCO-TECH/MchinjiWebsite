<!DOCTYPE html>
<html>
<body>
  <h1>Check Exam Result</h1>
  Form: <select id="form">
    <option value="1">Form 1</option>
    <option value="2">Form 2</option>
    <option value="3">Form 3</option>
    <option value="4">Form 4</option>
  </select><br><br>
  Exam No: <input id="examNo" type="text"><br><br>
  DOB: <input id="dob" type="date"><br><br>
  <button onclick="checkResult()">Check</button>
  <div id="result"></div>

  <script src="https:                                                                        
  <script>
    async function loadCSV(url) {
      const response = await fetch(url);
      const text = await response.text();
      const rows = text.split('\n').map(row => row.split(','));
      return rows;
    }

    async function fillReportCard(form, examNo, dob) {
      const csvUrl = `form${form}.csv`;
      const data = await loadCSV(csvUrl);
      let found = false;
      for (let row of data.slice(2)) {
        const cols = row;
        if (cols.length < 64) continue;
        if (cols[1]?.trim() === examNo.trim() && cols[2]?.trim() === dob) {
          const nameIndex = 9;
          const formIndex = 0;
          const termIndex = 3;                      
          const yearIndex = 4;
          const headTeacherIndex = 5;
          const bankDetailsIndex = 6;
          const nextTermIndex = 7;
          const positionIndex = 62;
          const remarksIndex = 63;

          const subjects = ['AGRI', 'BIBLE', 'BIO', 'CHE', 'CHI', 'HFC', 'ENG', 'HIS', 'GEO', 'S/LF', 'MAT', 'PHY', 'COM'];
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();

          doc.setFontSize(18);
          doc.text("REPORT CARD", 105, 15, { align: "center" });
          doc.setFontSize(14);
          doc.text("MCHINJI SECONDARY SCHOOL", 105, 25, { align: "center" });

          doc.setFontSize(12);
          doc.text(`Name: ${cols[nameIndex]}`, 10, 40);
          doc.text(`Form: ${cols[formIndex]}   Term: ${cols[termIndex] || 'N/A'}   Year: ${cols[yearIndex]}`, 10, 50);
          doc.text(`Position in Class: ${cols[positionIndex]}   Remarks: ${cols[remarksIndex]}`, 10, 60);

          let y = 70;
          doc.text("SUBJECT | AGGREGATE (%) | GRADE | POSITION | REMARKS", 10, y);
          y += 10;
          subjects.forEach((subject, i) => {
            const baseIndex = 10 + (i * 4);
            doc.text(`${subject} | ${cols[baseIndex]} | ${cols[baseIndex + 1]} | ${cols[baseIndex + 2]} | ${cols[baseIndex + 3]}`, 10, y);
            y += 10;
          });

          y += 10;
          doc.text(`Headteacher: ${cols[headTeacherIndex]}`, 10, y);
          y += 10;
          doc.text(`Bank Details: ${cols[bankDetailsIndex]}`, 10, y);
          y += 10;
          doc.text(`Next Term Opens: ${cols[nextTermIndex]}`, 10, y);

          doc.save("report-card.pdf");
          found = true;
          return;
        }
      }
      if (!found) {
        document.getElementById('result').innerHTML = 'No matching record found';
      }
    }

    function checkResult() {
      const form = document.getElementById('form').value;
      const examNo = document.getElementById('examNo').value.trim();
      const dob = document.getElementById('dob').value.split('-').reverse().join('/'); // dd/mm/yyyy
      fillReportCard(form, examNo, dob);
    }
  </script>
</body>
</html>
