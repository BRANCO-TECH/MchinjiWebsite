<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mchinji Secondary School - Exam Portal</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

    <div class="card">
        <img src="logo.png" alt="Mchinji Secondary School Logo" class="logo">
        <h2>Mchinji Secondary School</h2>
        <h1>Examination Web Portal</h1>
        <h4>Choose your category below to check exam results</h4>

        <div class="button-group">
            <button id="daySchoolBtn" class="green-btn">Day School Examination Results</button>
            <button id="odlBtn" class="green-btn">ODL School Examination Results</button>
        </div>

        <br><br>

        <!-- Input Section (Hidden by default) -->
        <div id="options" style="display: none;">
            <p id="instruction" style="color:#666;">Select your form then enter your exam number and password below:</p>
            
            <label for="form">Select Form:</label><br>
            <select id="form">
                <option value="" disabled selected>-- Choose Form --</option>
                <option value="1">Form 1</option>
                <option value="2">Form 2</option>
                <option value="3">Form 3</option>
                <option value="4">Form 4</option>
            </select>
            
            <br><br>
            
            <label for="examNo">Exam No:</label><br>
            <input id="examNo" type="text" placeholder="Enter Exam Number">
            
            <br><br>
            
            <label for="password">Password:</label><br>
            <input id="password" type="password" placeholder="Enter Password">
            
            <br><br>
            
            <button id="checkResultBtn" class="green-btn">Check Result</button>
        </div>

        <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
