<body>
  <div class="card">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Mchinji Secondary School</h2>
    <h1>Examination Web Portal</h1>

      Exam No: <input id="examNo" type="text"><br><br>
      Password: <input id="password" type="password"><br><br>
