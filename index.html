<!DOCTYPE html>
<html>
<head>
  <script src="https:                                                                        
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border: 1px solid      
      padding: 8px;
      text-align: center;
    }
    @media (max-width: 600px) {
      table {
        font-size: 12px;
      }
      th, td {
        padding: 4px;
      }
    }
  </style>
</head>
<body>
  <h1>Check Exam Result</h1>
  Form: <select id="form">
    <option value="1">Form 1</option>
    <option value="2">Form 2</option>
    <option value="3">Form 3</option>
    <option value="4">Form 4</option>
  </select><br><br>
  Exam No: <input id="examNo" type="text"><br><br>
  DOB: <input id="dob" type="date"><br><br>
  <button id="checkBtn">Check</button>
  <div id="result"></div>

  <script>
    async function loadCSV(url) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to load ${url}: ${response.status}`);
        const text = await response.text();
        return text.split('\n').map(row => row.split(','));
      } catch (e) {
        console.error(e);
        document.getElementById('result').innerHTML = `Error loading CSV: ${e.message}`;
        return [];
      }
    }

    async function fillReportCard(form, examNo, dob) {
      const csvUrl = `form${form}.csv`;
      const data = await loadCSV(csvUrl);
      if (data.length < 3) {
        document.getElementById('result').innerHTML = 'CSV file has insufficient data';
        return;
      }
      let found = false;
      for (let row of data.slice(2)) {
        if (row.length < 64) continue;
        const cols = row;
        if (cols[1]?.trim() === examNo && cols[2]?.trim() === dob) {
          found = true;
          document.getElementById('result').innerHTML = `
            <h2>REPORT CARD</h2>
            <p><strong>Name:</strong> ${cols[9]}</p>
            <p><strong>Form:</strong> ${form} Term: 2 Year: 2026</p>
            <table>
              <tr>
                <th>SUBJECT</th>
                <th>AGGREGATE (%)</th>
                <th>GRADE</th>
                <th>POSITION</th>
                <th>REMARKS</th>
              </tr>
              <tr>
                <td>AGRI</td><td>${cols[10]}</td><td>${cols[11]}</td><td>${cols[12]}</td><td>Fail</td>
              </tr>
              <!-- Add other subjects dynamically -->
            </table>
            <p><strong>HEADTEACHER:</strong> MR.J LUHANA | CELL: 0999441723</p>
          `;
          return;
        }
      }
      if (!found) {
        document.getElementById('result').innerHTML = 'No matching record found';
      }
    }

    function checkResult() {
      const form = document.getElementById('form').value;
      const examNo = document.getElementById('examNo').value.trim();
      const dob = document.getElementById('dob').value.split('-').reverse().join('/'); // dd/mm/yyyy
      fillReportCard(form, examNo, dob);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('checkBtn').addEventListener('click', checkResult);
    });
  </script>
</body>
</html>
