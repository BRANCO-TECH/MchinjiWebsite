
<!DOCTYPE html>
<html>
<body>
  <h1>Check Exam Result</h1>
  Form: <select id="form"><option value="1">Form 1</option></select><br><br>
  Exam No: <input id="examNo" type="text"><br><br>
  DOB: <input id="dob" type="date"><br><br>
  <button onclick="checkResult()">Check</button>
  <div id="result"></div>

  <script>
    async function loadCSV(url) {
      const response = await fetch(url);
      const text = await response.text();
      const rows = text.split('\n').map(row => row.split(','));
      return rows;
    }

    async function fillReportCard(csvUrl, examNo, dob) {
      const data = await loadCSV(csvUrl);
      let found = false;
      for (let row of data.slice(2)) { // skip first two header rows
        const cols = row;
        if (cols.length < 64) continue;
        console.log('Checking:', cols[1], cols[2]);
        if (cols[1]?.trim() === examNo && cols[2]?.trim() === dob) {
          let html = `
            <div style="width: 600px; margin: auto; border: 1px solid black; padding: 10px;">
              <div style="float: right; text-align: right;">
                <p><strong>HEADTEACHER:</strong> ${cols[5]}</p>
                <p><strong>BANK DETAILS FOR FEES PAYMENT:</strong> ${cols[6]}</p>
                <p><strong>NEXT TERM OPENS ON:</strong> ${cols[7]}</p>
              </div>
              <h2>CANDIDATE INFORMATION</h2>
              <p><strong>Name:</strong> ${cols[9]}</p>
              <p><strong>Form:</strong> ${cols[0]} <strong>Year:</strong> ${cols[4]}</p>
              <table border="1" width="100%">
                <tr>
                  <th>SUBJECT</th>
                  <th>AGGREGATE (%)</th>
                  <th>GRADE</th>
                  <th>POSITION</th>
                  <th>REMARKS</th>
                </tr>
          `;
          const subjects = ['AGRI', 'BIBLE', 'BIO', 'CHE', 'CHI', 'HFC', 'ENG', 'HIS', 'GEO', 'S/LF', 'MAT', 'PHY', 'COM'];
          subjects.forEach((subject, i) => {
            const colIndex = 10 + (i * 4); // K, O, S, ... for AGGREGATE
            html += `
              <tr>
                <td>${subject}</td>
                <td>${cols[colIndex]}</td> <!-- AGGREGATE (%) -->
                <td>${cols[colIndex + 1]}</td> <!-- GRADE -->
                <td>${cols[colIndex + 2]}</td> <!-- POSITION -->
                <td>${cols[colIndex + 3]}</td> <!-- REMARKS -->
              </tr>
            `;
          });
          html += `
              </table>
              <p><strong>POSITION IN CLASS:</strong> ${cols[62]}</p>
              <p><strong>REMARKS:</strong> ${cols[63]}</p>
            </div>
          `;
          document.getElementById('result').innerHTML = html;
          found = true;
          return;
        } else {
          console.log('No match:', cols[1], examNo, cols[2], dob);
        }
      }
      if (!found) {
        document.getElementById('result').innerHTML = 'No matching record found';
      }
    }

    function checkResult() {
      const examNo = document.getElementById('examNo').value.trim();
      const dob = document.getElementById('dob').value.split('-').reverse().join('/'); // dd/mm/yyyy
      fillReportCard('form1.csv', examNo, dob);
    }
  </script>
</body>
</html>
