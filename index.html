<!DOCTYPE html>
<html>
<body>
  <h1>Check Exam Result</h1>
  Form: <select id="form"><option value="1">Form 1</option></select><br><br>
  Exam No: <input id="examNo" type="text"><br><br>
  DOB: <input id="dob" type="date"><br><br>
  <button onclick="checkResult()">Check</button>
  <div id="result"></div>

  <script>
    async function loadCSV(url) {
      const response = await fetch(url);
      const text = await response.text();
      const rows = text.split('\n').map(row => row.split(','));
      return rows;
    }

    async function fillReportCard(csvUrl, examNo, dob) {
      const data = await loadCSV(csvUrl);
      let found = false;
      for (let row of data.slice(2)) {
        const cols = row;
        if (cols.length < 64) continue;
        if (cols[1]?.trim() === examNo && cols[2]?.trim() === dob) {
          const nameIndex = 9;
          const formIndex = 0;
          const yearIndex = 4;
          const headTeacherIndex = 5;
          const bankDetailsIndex = 6;
          const nextTermIndex = 7;
          const positionIndex = 62;
          const remarksIndex = 63;

          const subjects = ['AGRI', 'BIBLE', 'BIO', 'CHE', 'CHI', 'HFC', 'ENG', 'HIS', 'GEO', 'S/LF', 'MAT', 'PHY', 'COM'];
          let html = `
            <div style="width: 800px; height: 900px; margin: auto; border: 1px solid black; padding: 20px; font-size: 14px; position: relative;">
              <h2 style="text-align: center;">REPORT CARD</h2>
              <p><strong>Name:</strong> ${cols[nameIndex]}</p>
              <p><strong>Form:</strong> ${cols[formIndex]} <strong>Year:</strong> ${cols[yearIndex]}</p>
              <p style="position: absolute; top: 20px; right: 20px; text-align: right;">
                <strong>POSITION IN CLASS:</strong> ${cols[positionIndex]}
              </p>
              <p style="position: absolute; top: 40px; right: 20px; text-align: right;">
                <strong>REMARKS:</strong> ${cols[remarksIndex]}
              </p>
              <table border="1" width="100%" style="font-size: 14px; table-layout: fixed; word-wrap: break-word;">
                <tr>
                  <th style="width: 20%;">SUBJECT</th>
                  <th style="width: 20%;">AGGREGATE (%)</th>
                  <th style="width: 15%;">GRADE</th>
                  <th style="width: 15%;">POSITION</th>
                  <th style="width: 30%;">REMARKS</th>
                </tr>
          `;

          subjects.forEach((subject, i) => {
            const baseIndex = 10 + (i * 4);
            html += `
              <tr>
                <td>${subject}</td>
                <td>${cols[baseIndex]}</td>
                <td>${cols[baseIndex + 1]}</td>
                <td>${cols[baseIndex + 2]}</td>
                <td>${cols[baseIndex + 3]}</td>
              </tr>
            `;
          });

          html += `
              </table>
              <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid black;">
                <table border="0" style="font-size: 10px;">
                  <tr><td><strong>HEADTEACHER:</strong></td><td>${cols[headTeacherIndex]}</td></tr>
                  <tr><td><strong>BANK DETAILS FOR FEES PAYMENT:</strong></td><td>${cols[bankDetailsIndex]}</td></tr>
                  <tr><td><strong>NEXT TERM OPENS ON:</strong></td><td>${cols[nextTermIndex]}</td></tr>
                </table>
              </div>
            </div>
          `;
          document.getElementById('result').innerHTML = html;
          found = true;
          return;
        }
      }
      if (!found) {
        document.getElementById('result').innerHTML = 'No matching record found';
      }
    }

    function checkResult() {
      const examNo = document.getElementById('examNo').value.trim();
      const dob = document.getElementById('dob').value.split('-').reverse().join('/'); // dd/mm/yyyy
      fillReportCard('form1.csv', examNo, dob);
    }
  </script>
</body>
</html>
